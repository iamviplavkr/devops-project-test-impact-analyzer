name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-impact-analysis:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Setup Python
    - name: Setup Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    # Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Run all tests (baseline)
    - name: Run All Tests
      run: python -m pytest tests/

    # Run impacted tests (main feature)
    - name: Run Impacted Tests Only
      run: python src/scripts/run_tests.py

    # Optional Docker build
    - name: Build Docker Image
      run: docker build -t test-impact-analyzer .

    # Final message
    - name: Pipeline Success
      run: echo "CI/CD Pipeline executed successfully!"